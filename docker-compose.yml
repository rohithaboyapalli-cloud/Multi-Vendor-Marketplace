services:
  backend:
    build: ./backend
    container_name: marketplace-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
      - ./backend/app:/app/app
    environment:
      - SECRET_KEY=your-super-secret-key-change-in-production-min-32-chars
      - DB_PATH=data/marketplace.json
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID:-rzp_test_placeholder}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET:-razorpay_secret_placeholder}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY:-sk_test_placeholder}
      - STRIPE_PUBLISHABLE_KEY=${STRIPE_PUBLISHABLE_KEY:-pk_test_placeholder}
      - UPI_ID=${UPI_ID:-marketplace@upi}
      - FRONTEND_URL=http://localhost:3000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: /api
    container_name: marketplace-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
